version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: LiteDoc_db_8KfR3xZ9_mPqW@2024!
      MYSQL_DATABASE: LiteDoc
    ports:
      - "3307:3306"
    volumes:
      - litedoc-mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio
    container_name: litedoc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - litedoc-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 30s

  backend:
    build: .
    container_name: litedoc-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: LiteDoc
      DB_USER: root
      DB_PASSWORD: LiteDoc_db_8KfR3xZ9_mPqW@2024!
      JWT_SECRET: a31946486fe44141a8bcddc3b6c4fadda5532b8d3ef54e50aeadd58eb3a6b9e2
      JWT_EXPIRATION_HOURS: "168"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: 8KfR3xZ9_mPqW0asWxcxx1r0OkM
      MINIO_BUCKET: litedoc
      MINIO_SECURE: "false"
      USER_SECRET_KEY: J9KL0xz13mBiz00kGUA8xzcoMoxz0I2N84b7vxiD7i3m9ZN2KaHZ8js
      # Microsoft SSO
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-86c6ff40-afa2-47bb-943b-0eef01572784}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-fdfed7bd-9f6a-44a1-b694-6e39c468c150}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-https://ifollow.cloud/api/auth/microsoft/callback}
      FRONTEND_URL: ${FRONTEND_URL:-https://ifollow.cloud}
      # LDAP
      LDAP_ENABLED: ${LDAP_ENABLED:-true}
      LDAP_HOST: ${LDAP_HOST}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_USE_SSL: ${LDAP_USE_SSL:-false}
      LDAP_BIND_USER: ${LDAP_BIND_USER}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_USER_SEARCH_BASE: ${LDAP_USER_SEARCH_BASE}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(&(objectClass=user)(sAMAccountName={username}))}
      LDAP_GROUP_ATTRIBUTE: ${LDAP_GROUP_ATTRIBUTE:-memberOf}
      LDAP_USER_GROUP_DN: ${LDAP_USER_GROUP_DN}
      LDAP_ADMIN_GROUP_DN: ${LDAP_ADMIN_GROUP_DN}
      LDAP_EMAIL_ATTRIBUTE: ${LDAP_EMAIL_ATTRIBUTE:-mail,userPrincipalName}
      LDAP_DISPLAY_NAME_ATTRIBUTE: ${LDAP_DISPLAY_NAME_ATTRIBUTE:-displayName}

volumes:
  litedoc-mysql-data:
  litedoc-minio-data: